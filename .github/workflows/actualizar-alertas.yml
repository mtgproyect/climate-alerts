name: Actualizar alertas SMN

run-name: Alertas SMN · disparo externo

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: climate-alerts
  cancel-in-progress: true

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        run: python -m pip install -r requirements.txt

      - name: Sincronizar polígonos de alerta
        run: python scripts/sincronizar_areas_alerta.py

      - name: Vincular 10.601 localidades
        run: python scripts/generar_mapa_localidades.py

      - name: Consultar alertas oficiales
        run: |
          python scripts/actualizar_alertas_smn.py \
            --http-attempts 4 \
            --retry-base-seconds 2.0 \
            --timeout-seconds 45

      - name: Validar datos
        run: |
          python -m json.tool docs/alertas.json > /dev/null
          python -m json.tool docs/manifiesto.json > /dev/null
          python -m json.tool \
            docs/localidades_alerta.min.json > /dev/null
          python -m json.tool \
            docs/areas_alerta.geojson > /dev/null
          python -m unittest discover -s tests -v
          node --check docs/assets/js/app.js

      - name: Guardar actualización en GitHub
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            data/areas_alerta.geojson \
            data/diagnostico_localidades_alerta.json \
            data/mapeo_metadata.json \
            docs/alertas.json \
            docs/manifiesto.json \
            docs/areas_alerta.geojson \
            docs/localidades_alerta.min.json

          if git diff --cached --quiet; then
            echo "No hay cambios de alertas para guardar en GitHub."
            exit 0
          fi

          git commit -m "Actualizar alertas meteorológicas SMN"

          for intento in 1 2 3; do
            echo "Intento de guardado ${intento}/3"

            git fetch origin main

            if ! git rebase origin/main; then
              git rebase --abort || true
              echo "Conflicto al integrar cambios remotos."
              exit 1
            fi

            if git push origin HEAD:main; then
              echo "Alertas meteorológicas actualizadas correctamente en GitHub."
              exit 0
            fi

            sleep 5
          done

          echo "No fue posible guardar los cambios después de 3 intentos."
          exit 1

      - name: Instalar AWS CLI para R2
        run: |
          python -m pip install --upgrade pip
          pip install awscli

      - name: Subir alertas a Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_EC2_METADATA_DISABLED: true
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          aws s3 cp docs/manifiesto.json s3://weathervar-data/alerts/manifiesto.json \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type "application/json" \
            --cache-control "public, max-age=300"

          aws s3 cp docs/alertas.json s3://weathervar-data/alerts/alertas.json \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type "application/json" \
            --cache-control "public, max-age=300"

          aws s3 cp docs/localidades_alerta.min.json s3://weathervar-data/alerts/localidades_alerta.min.json \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type "application/json" \
            --cache-control "public, max-age=300"

          aws s3 cp docs/areas_alerta.geojson s3://weathervar-data/alerts/areas_alerta.geojson \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type "application/geo+json" \
            --cache-control "public, max-age=300"

          echo "Alertas subidas correctamente a Cloudflare R2."
